<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DankDash</title>
    <script>
        // Handle client-side routing for SPA
        const path = window.location.pathname;
        if (path.startsWith('/admin') || path.startsWith('/shop') || path.startsWith('/cart') || 
            path === '/login' || path === '/register' || path === '/partners' || path === '/delivery') {
            window.location.href = '/';
        } else {
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <p>Redirecting to DankDash...</p>
</body>
</html>
